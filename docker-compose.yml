services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "9000"
    env_file:
      - .env
    volumes:
      - storage:/var/www/storage

  horizon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: php artisan horizon
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - storage:/var/www/storage

  nginx:
    image: nginx:1-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80"
    volumes:
      # 🔥 IMPORTANT: share the SAME app code so nginx sees Vite build
      - ./backend:/var/www:ro

      # nginx config
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    image: redis:7.4.6-alpine
    restart: always
    volumes:
      - redis-data:/data

volumes:
  storage:
  redis-data: